<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitwall — Car Visualization v2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0B0C;font-family:'Barlow Condensed',sans-serif;color:#F2F0EB;padding:28px;display:flex;flex-direction:column;align-items:center;gap:24px}
.switcher{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.sw-btn{display:flex;align-items:stretch;border-radius:3px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.1);cursor:pointer;transition:border-color 0.15s;font-family:'JetBrains Mono',monospace}
.sw-btn:hover{border-color:rgba(255,255,255,0.25)}
.sw-btn.active{border-color:rgba(255,255,255,0.45)}
.sw-bar{width:4px;flex-shrink:0}
.sw-body{padding:5px 10px;background:#111113;display:flex;flex-direction:column;gap:1px}
.sw-abbr{font-size:12px;font-weight:700;letter-spacing:0.04em}
.sw-team{font-size:8px;color:#6B6B70;letter-spacing:0.06em}
.widget{width:1040px;background:#111113;border:0.5px solid rgba(255,255,255,0.08);border-radius:6px;overflow:hidden}
.widget-header{background:#181819;border-bottom:0.5px solid rgba(255,255,255,0.07);padding:10px 16px;display:flex;align-items:center;gap:12px}
.wh-badge{display:flex;align-items:stretch;border-radius:3px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.12)}
.wh-bar{width:4px}
.wh-body{padding:4px 10px;background:#1E1E20;display:flex;align-items:center;gap:8px}
.wh-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6B6B70;letter-spacing:0.06em}
.wh-name{font-size:18px;font-weight:800;letter-spacing:0.03em}
.wh-team{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6B6B70}
.wh-stats{margin-left:auto;display:flex;gap:18px;align-items:center}
.whs{display:flex;flex-direction:column;gap:1px;align-items:flex-end}
.whs-l{font-family:'JetBrains Mono',monospace;font-size:8px;color:#4A4A4F;letter-spacing:0.1em;text-transform:uppercase}
.whs-v{font-size:16px;font-weight:700;line-height:1}
.car-area{background:#0D0D0F;padding:16px 24px 12px;position:relative}
.stats-strip{display:flex;border-top:0.5px solid rgba(255,255,255,0.07)}
.stat-cell{flex:1;padding:10px 14px;border-right:0.5px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:2px}
.stat-cell:last-child{border-right:none}
.sc-l{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:#4A4A4F}
.sc-v{font-size:20px;font-weight:800;line-height:1}
.sc-u{font-family:'JetBrains Mono',monospace;font-size:8px;color:#4A4A4F}
.sc-bar{height:2px;background:#1E1E20;border-radius:1px;margin-top:5px;overflow:hidden}
.sc-f{height:100%;border-radius:1px}
.damage-row{background:#181819;border-top:0.5px solid rgba(255,255,255,0.06);padding:8px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dmg-l{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:#4A4A4F;flex-shrink:0;margin-right:4px}
.dmg-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.04em;border:0.5px solid}
.dmg-ok{background:rgba(29,184,106,0.06);border-color:rgba(29,184,106,0.2);color:#1DB86A}
.dmg-warn{background:rgba(224,144,0,0.07);border-color:rgba(224,144,0,0.28);color:#E09000}
.dmg-crit{background:rgba(232,19,43,0.07);border-color:rgba(232,19,43,0.28);color:#E8132B}
.dmg-dot{width:5px;height:5px;border-radius:50%}
</style>
</head>
<body>

<div class="switcher" id="switcher"></div>
<div class="widget" id="widget">
  <div class="widget-header" id="header"></div>
  <div class="car-area" id="carArea">
    <svg id="carSvg" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible"></svg>
  </div>
  <div class="stats-strip" id="statsStrip"></div>
  <div class="damage-row" id="damageRow"></div>
</div>

<script>
const DRIVERS=[
  {abbr:'VER',name:'Verstappen',num:'1',team:'Red Bull Racing',pos:1,c1:'#3671C6',c2:'#FFD700',
   tyres:{FL:{c:'M',age:18,wear:19},FR:{c:'M',age:18,wear:23},RL:{c:'M',age:18,wear:34},RR:{c:'M',age:18,wear:43}},
   stats:{speed:312,throttle:99,ers:68,bat:74,fuel:58,gear:8,rpm:11141,drs:true,brake:0},
   damage:{fw:'OK',rw:'OK',floor:'Minor',sus:'OK',rr:'High wear'}},
  {abbr:'NOR',name:'Norris',num:'4',team:'McLaren',pos:2,c1:'#FF8000',c2:'#000000',
   tyres:{FL:{c:'S',age:22,wear:35},FR:{c:'S',age:22,wear:39},RL:{c:'S',age:22,wear:57},RR:{c:'S',age:22,wear:64}},
   stats:{speed:308,throttle:96,ers:71,bat:69,fuel:52,gear:8,rpm:10980,drs:true,brake:0},
   damage:{fw:'OK',rw:'OK',floor:'OK',sus:'OK',rr:'Critical'}},
  {abbr:'LEC',name:'Leclerc',num:'16',team:'Ferrari',pos:3,c1:'#E8002D',c2:'#FFCC00',
   tyres:{FL:{c:'H',age:35,wear:28},FR:{c:'H',age:35,wear:31},RL:{c:'H',age:35,wear:45},RR:{c:'H',age:35,wear:50}},
   stats:{speed:305,throttle:100,ers:55,bat:81,fuel:63,gear:7,rpm:11250,drs:false,brake:0},
   damage:{fw:'Minor',rw:'OK',floor:'OK',sus:'OK',rr:'Moderate'}},
  {abbr:'HAM',name:'Hamilton',num:'44',team:'Ferrari',pos:6,c1:'#E8002D',c2:'#FFCC00',
   tyres:{FL:{c:'M',age:12,wear:10},FR:{c:'M',age:12,wear:12},RL:{c:'M',age:12,wear:18},RR:{c:'M',age:12,wear:21}},
   stats:{speed:298,throttle:88,ers:82,bat:88,fuel:71,gear:6,rpm:10400,drs:false,brake:15},
   damage:{fw:'OK',rw:'OK',floor:'OK',sus:'OK',rr:'Low'}},
  {abbr:'RUS',name:'Russell',num:'63',team:'Mercedes',pos:5,c1:'#00D2BE',c2:'#FFFFFF',
   tyres:{FL:{c:'M',age:9,wear:8},FR:{c:'M',age:9,wear:9},RL:{c:'M',age:9,wear:14},RR:{c:'M',age:9,wear:15}},
   stats:{speed:310,throttle:97,ers:75,bat:78,fuel:66,gear:8,rpm:11050,drs:true,brake:0},
   damage:{fw:'OK',rw:'OK',floor:'OK',sus:'OK',rr:'Low'}},
];

const CC={S:'#FF1E1E',M:'#FFD600',H:'#F5F5F5',I:'#39E55B',W:'#4AB8FF'};
const CL={S:'SOFT',M:'MED',H:'HARD',I:'INTER',W:'WET'};

function wearCol(p){return p>=50?'#E8132B':p>=28?'#E09000':'#1DB86A'}

function buildSwitcher(){
  document.getElementById('switcher').innerHTML=DRIVERS.map((d,i)=>`
    <div class="sw-btn ${i===0?'active':''}" onclick="setDriver(${i})" id="sw${i}">
      <div class="sw-bar" style="background:${d.c1}"></div>
      <div class="sw-body">
        <div class="sw-abbr" style="color:${d.c1}">${d.abbr}</div>
        <div class="sw-team">${d.team.split(' ')[0].toUpperCase()}</div>
      </div>
    </div>`).join('');
}

function buildHeader(d){
  const pc=d.pos===1?'#C9A84C':d.pos<=3?'#aaa':'#6B6B70';
  document.getElementById('header').innerHTML=`
    <div class="wh-badge">
      <div class="wh-bar" style="background:${d.c1}"></div>
      <div class="wh-body">
        <div class="wh-num">#${d.num}</div>
        <div class="wh-name" style="color:${d.c1}">${d.abbr}</div>
        <div class="wh-team">${d.team.toUpperCase()}</div>
      </div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;background:rgba(255,255,255,0.05);color:${pc}">P${d.pos}</div>
    <div style="width:0.5px;height:20px;background:rgba(255,255,255,0.08)"></div>
    <div class="wh-stats">
      <div class="whs"><div class="whs-l">Speed</div><div class="whs-v" style="color:${d.stats.speed>310?'#E8132B':'#F2F0EB'}">${d.stats.speed}<span style="font-size:10px;color:#6B6B70;margin-left:2px">km/h</span></div></div>
      <div class="whs"><div class="whs-l">Gear</div><div class="whs-v">${d.stats.gear}</div></div>
      <div class="whs"><div class="whs-l">RPM</div><div class="whs-v">${d.stats.rpm.toLocaleString()}</div></div>
      <div class="whs"><div class="whs-l">DRS</div><div class="whs-v" style="color:${d.stats.drs?'#1DB86A':'#4A4A4F'};font-size:13px">${d.stats.drs?'ON':'OFF'}</div></div>
    </div>`;
}

function buildStats(d){
  const items=[
    {l:'Speed',v:d.stats.speed,u:'km/h',f:d.stats.speed/360,col:d.stats.speed>310?'#E8132B':'#F2F0EB'},
    {l:'Throttle',v:d.stats.throttle+'%',u:'',f:d.stats.throttle/100,col:'#E8132B'},
    {l:'Brake',v:d.stats.brake+'%',u:'',f:d.stats.brake/100,col:'#4AB8FF'},
    {l:'ERS',v:d.stats.ers+'%',u:'deploy',f:d.stats.ers/100,col:'#E8132B'},
    {l:'Battery',v:d.stats.bat+'%',u:'SOC est.',f:d.stats.bat/100,col:'#1DB86A'},
    {l:'Fuel est.',v:'~'+d.stats.fuel+'%',u:'inferred',f:d.stats.fuel/100,col:'#C9A84C'},
    {l:'Gear',v:d.stats.gear,u:'rpm '+d.stats.rpm.toLocaleString(),f:d.stats.gear/8,col:'#F2F0EB'},
  ];
  document.getElementById('statsStrip').innerHTML=items.map(i=>`
    <div class="stat-cell">
      <div class="sc-l">${i.l}</div>
      <div class="sc-v" style="color:${i.col}">${i.v}</div>
      <div class="sc-u">${i.u}</div>
      <div class="sc-bar"><div class="sc-f" style="width:${Math.round(i.f*100)}%;background:${i.col}"></div></div>
    </div>`).join('');
}

function buildDamage(d){
  function chip(label,status){
    const cls=status==='OK'?'dmg-ok':status==='Minor'?'dmg-warn':'dmg-crit';
    const dot=status==='OK'?'#1DB86A':status==='Minor'?'#E09000':'#E8132B';
    return `<div class="dmg-chip ${cls}"><div class="dmg-dot" style="background:${dot}"></div>${label}: ${status}</div>`;
  }
  document.getElementById('damageRow').innerHTML=`
    <div class="dmg-l">Health</div>
    ${chip('Front wing',d.damage.fw)}
    ${chip('Rear wing',d.damage.rw)}
    ${chip('Floor',d.damage.floor)}
    ${chip('Suspension',d.damage.sus)}
    ${chip('RR tyre',d.damage.rr)}
    <div style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;color:#4A4A4F">~inferred where marked</div>`;
}

// ────────────────────────────────────────────────
//  THE CAR SVG  — 2026-regulation profile
//  Carefully traced from the FIA reference image:
//  - Very long tapered nose, ground-skimming
//  - Large rounded sidepods with aggressive undercut
//  - Smooth engine cover humping up to roll hoop
//  - Short, wide rear wing with clean end plates
//  - 18" wheels with Pirelli-style sidewall markings
//  - Halo integrated flush with cockpit surround
//  - Tire data labels rendered ON TOP of tires
// ────────────────────────────────────────────────
function buildCarSVG(d){
  const c=d.c1;          // primary team color
  const c2=d.c2;         // secondary
  const FL=d.tyres.FL, FR=d.tyres.FR, RL=d.tyres.RL, RR=d.tyres.RR;

  // Tire label helper — renders compound + wear badge centered over a tire
  // cx,cy = tire center, r = tire radius
  function tireLabel(tire, cx, cy, r){
    const compCol=CC[tire.c];
    const wCol=wearCol(tire.wear);
    return `
      <!-- compound pill centered on tire -->
      <rect x="${cx-22}" y="${cy-14}" width="44" height="14" rx="3" fill="rgba(0,0,0,0.82)" stroke="${compCol}" stroke-width="1"/>
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="10" font-weight="800" fill="${compCol}">${CL[tire.c]}</text>
      <!-- wear bar centered on tire -->
      <rect x="${cx-22}" y="${cy+2}" width="44" height="10" rx="3" fill="rgba(0,0,0,0.82)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
      <rect x="${cx-20}" y="${cy+4}" width="${Math.round(40*tire.wear/100)}" height="6" rx="2" fill="${wCol}"/>
      <text x="${cx+24}" y="${cy+10}" text-anchor="start" font-family="'JetBrains Mono',monospace" font-size="7" fill="${wCol}">${tire.wear}%</text>
      <!-- age -->
      <text x="${cx}" y="${cy+20}" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7" fill="rgba(255,255,255,0.35)">L${tire.age}</text>`;
  }

  // Front wheel center: x=215, y=218   radius=54 (overall), rim=28
  // Rear  wheel center: x=790, y=218   radius=62 (overall), rim=33

  return `
<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible">
<defs>

    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </linearGradient>
  <!-- Underfloor shadow -->
  <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1a1e"/>
    <stop offset="100%" stop-color="#080809"/>
  </linearGradient>
  <!-- Ground shadow -->
  <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(0,0,0,0.45)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <!-- Tire gradient -->
  <radialGradient id="tireG" cx="42%" cy="38%" r="58%">
    <stop offset="0%" stop-color="#3a3a3e"/>
    <stop offset="55%" stop-color="#1e1e22"/>
    <stop offset="100%" stop-color="#111114"/>
  </radialGradient>
  <!-- Team stripe gradient -->
  <linearGradient id="stripeG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="${c}" stop-opacity="0"/>
    <stop offset="8%" stop-color="${c}" stop-opacity="1"/>
    <stop offset="88%" stop-color="${c}" stop-opacity="1"/>
    <stop offset="100%" stop-color="${c}" stop-opacity="0"/>
  </linearGradient>
</defs>

function setDriver(idx){
  DRIVERS.forEach((_,i)=>document.getElementById('sw'+i).classList.toggle('active',i===idx));
  const d=DRIVERS[idx];
  buildHeader(d);
  document.getElementById('carSvg').outerHTML=buildCarSVG(d);
  // replace the svg element
  document.getElementById('carArea').innerHTML=`<div id="carSvgWrap">${buildCarSVG(d)}</div>`;
  buildStats(d);
  buildDamage(d);
}

// Init
const d=DRIVERS[0];
buildHeader(d);
document.getElementById('carArea').innerHTML=`<div id="carSvgWrap">${buildCarSVG(d)}</div>`;
buildStats(d);
buildDamage(d);
// Wire switcher after init
DRIVERS.forEach((_,i)=>{document.getElementById('sw'+i).onclick=()=>setDriver(i);});
</script>
